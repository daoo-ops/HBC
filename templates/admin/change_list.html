{% extends "admin/change_list.html" %}
{% load i18n %}

{% block content_title %}
{{ block.super }}
{% if cl.model_admin.list_description %}
<div class="hbc-admin-description">
  <span class="hbc-admin-desc-icon">ℹ</span>
  <p>{{ cl.model_admin.list_description }}</p>
</div>
{% endif %}
{% endblock %}

{% block extrahead %}
{{ block.super }}
<style>
  /* ── HBC Admin Description Banner ── */
  .hbc-admin-description {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: linear-gradient(135deg, #e8f4fd 0%, #f0f7ff 100%);
    border: 1px solid #b8d8f0;
    border-left: 4px solid #417690;
    border-radius: 6px;
    padding: 12px 16px;
    margin: -8px 0 18px 0;
    font-size: 13px;
    color: #2c4a5e;
    line-height: 1.55;
  }

  .hbc-admin-desc-icon {
    font-style: normal;
    font-size: 16px;
    color: #417690;
    flex-shrink: 0;
    margin-top: 1px;
    font-weight: bold;
  }

  .hbc-admin-description p {
    margin: 0;
  }
</style>
{% endblock %}
